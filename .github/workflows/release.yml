name: Release

# Trigger when a version tag is pushed (e.g. v2.0.0, v2.1.0-rc1).
on:
  push:
    tags:
      - "v*"

# Default to read-only; the release job explicitly elevates to contents:write.
permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Gate: run the full test suite before building any artifacts.
  # A release with failing tests is never uploaded.
  # ------------------------------------------------------------------
  test:
    name: Test gate (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package with dev + web dependencies
        run: python -m pip install -e ".[dev,web]"

      - name: Run test suite
        run: pytest tests/test_v2.py tests/test_web.py -v --tb=short

  # ------------------------------------------------------------------
  # Build: compile standalone executables and publish the GitHub Release.
  # Runs only after the test gate passes.
  # ------------------------------------------------------------------
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test

    # This job writes to GitHub Releases.
    permissions:
      contents: write

    strategy:
      # Upload every platform even if one build fails, so the Release
      # page is as complete as possible for partial failures.
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            # PyInstaller appends .exe automatically on Windows.
            build_name: box3d-windows-x64
            artifact_path: dist/box3d-windows-x64.exe
            gui_build_name: box3d-gui-windows-x64
            # GUI uses --onedir; the folder is zipped for distribution.
            gui_artifact_path: dist/box3d-gui-windows-x64.zip
          - os: ubuntu-latest
            build_name: box3d-linux-x64
            artifact_path: dist/box3d-linux-x64
            gui_build_name: box3d-gui-linux-x64
            gui_artifact_path: dist/box3d-gui-linux-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install libvips native library (Linux)
        # Install libvips so that pyvips is importable during the build and so
        # that ldconfig can resolve libvips.so.42 in the "Embed" step below.
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips libvips-dev

      - name: Install libvips native library (Windows)
        # Download the official prebuilt libvips web-variant for Windows x64.
        # The web variant covers all formats box3d uses (webp, jpeg, png, tiff).
        # We discover libvips-42.dll inside the extracted tree dynamically so
        # the step is resilient to minor changes in the zip's internal structure.
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "8.15.5"
          $archive = "vips-dev-w64-web-${version}.zip"
          $url = "https://github.com/libvips/build-win64-mxe/releases/download/v${version}/${archive}"
          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing
          Expand-Archive -Path $archive -DestinationPath C:\vips
          # Discover the actual bin/ directory regardless of internal zip structure
          $libvipsDll = Get-ChildItem -Path C:\vips -Recurse -Filter "libvips-42.dll" |
                          Select-Object -First 1
          if (-not $libvipsDll) { Write-Error "libvips-42.dll not found after extraction"; exit 1 }
          $binPath = $libvipsDll.Directory.FullName
          Write-Host "libvips bin dir: $binPath"
          echo $binPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          # Store path for the Embed step (GITHUB_ENV persists across steps)
          echo "VIPS_BIN=$binPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install runtime dependencies, web + gui extras, and PyInstaller
        # pyvips (Python CFFI bindings) is installed here; the native libvips
        # library was installed in the platform-specific step above.
        run: python -m pip install pyinstaller ".[web,gui,quality]"

      - name: Embed libvips shared library into pyvips package dir (Linux)
        # pyvips uses cffi.dlopen() at runtime — a dynamic load that PyInstaller
        # cannot trace statically. --collect-all pyvips only bundles the Python
        # files, never the native .so.  Copying libvips.so.42 into the pyvips
        # package directory before PyInstaller ensures --collect-all picks it up.
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Use pip show to find the pyvips dir without importing the module
          PYVIPS_DIR=$(pip show pyvips | grep '^Location:' | sed 's/Location: //')/pyvips
          LIBVIPS=$(ldconfig -p | grep 'libvips\.so\.' | awk '{print $NF}' | head -1)
          echo "Copying $LIBVIPS → $PYVIPS_DIR"
          cp "$LIBVIPS" "$PYVIPS_DIR/"
          find /usr/lib/x86_64-linux-gnu/vips-modules-* -name "*.so" \
            -exec cp -v {} "$PYVIPS_DIR/" \; 2>/dev/null || true
          python3 -c "import pyvips; print('pyvips', pyvips.__version__, '— libvips OK')"

      - name: Embed libvips DLLs into pyvips package dir (Windows)
        # VIPS_BIN was written to GITHUB_ENV by the Install step so the path
        # is always consistent regardless of the zip's internal structure.
        # pyvips dir is found via pip show (no module import — avoids a
        # chicken-and-egg DLL load failure).  Trailing whitespace is stripped
        # from all captured strings before use as filesystem paths.
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $vipsBin = $env:VIPS_BIN
          Write-Host "vips bin : $vipsBin"
          # Locate pyvips package dir via pip show (does not import the module)
          $pipLocation = (pip show pyvips | Select-String "^Location:").ToString() `
                           -replace "^Location:\s*", ""
          $pyvipsDir = Join-Path $pipLocation.Trim() "pyvips"
          Write-Host "pyvips dir: $pyvipsDir"
          if (-not (Test-Path $pyvipsDir)) {
            Write-Error "pyvips package dir not found: $pyvipsDir"; exit 1
          }
          $dlls = Get-ChildItem -Path $vipsBin -Filter "*.dll"
          Write-Host "Copying $($dlls.Count) DLLs from $vipsBin → $pyvipsDir"
          $dlls | Copy-Item -Destination $pyvipsDir -Force
          # Verify pyvips can now load libvips
          python -c "import pyvips; print('pyvips', pyvips.__version__, '-- libvips OK')"

      - name: Build standalone executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        # Resolve libvips.so.42 path via ldconfig before calling PyInstaller.
        # --add-binary places the .so at the ROOT of sys._MEIPASS, where the
        # PyInstaller bootloader sets LD_LIBRARY_PATH so cffi.dlopen() finds it.
        # This is explicit and does not rely on --collect-all's binary placement.
        run: |
          LIBVIPS=$(ldconfig -p | grep 'libvips\.so\.' | awk '{print $NF}' | head -1)
          echo "Bundling libvips: $LIBVIPS"
          pyinstaller \
            --onefile \
            --strip \
            --name ${{ matrix.build_name }} \
            --add-data "profiles:profiles" \
            --add-data "cli/instructions_template.txt:cli" \
            --add-data "web/ui:web/ui" \
            --add-data "tools:tools" \
            --add-binary "$LIBVIPS:." \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import fastapi \
            --collect-all pyvips \
            --hidden-import pyvips \
            cli/main.py

      - name: Build standalone executable (Windows)
        if: matrix.os == 'windows-latest'
        # pyvips loads libvips-42.dll at runtime via cffi.dlopen() — PyInstaller
        # cannot trace this dependency statically.  We use --add-binary to place
        # every DLL from the vips bin directory at the ROOT of sys._MEIPASS (the
        # "." destination), which is where both cffi.dlopen() and the Windows DLL
        # loader search.  DLLs in a subdirectory (e.g. pyvips/) are not found.
        shell: pwsh
        run: |
          $dllArgs = @(Get-ChildItem -Path $env:VIPS_BIN -Filter "*.dll" |
              ForEach-Object { "--add-binary"; "$($_.FullName);." })
          Write-Host "Adding $($dllArgs.Count / 2) vips DLL(s) at bundle root via --add-binary"
          $baseArgs = @(
            "--onefile",
            "--name", "${{ matrix.build_name }}",
            "--add-data", "profiles;profiles",
            "--add-data", "cli/instructions_template.txt;cli",
            "--add-data", "web/ui;web/ui",
            "--add-data", "tools;tools",
            "--hidden-import", "uvicorn.logging",
            "--hidden-import", "uvicorn.loops",
            "--hidden-import", "uvicorn.loops.auto",
            "--hidden-import", "uvicorn.protocols",
            "--hidden-import", "uvicorn.protocols.http",
            "--hidden-import", "uvicorn.protocols.http.auto",
            "--hidden-import", "uvicorn.protocols.websockets",
            "--hidden-import", "uvicorn.protocols.websockets.auto",
            "--hidden-import", "uvicorn.lifespan",
            "--hidden-import", "uvicorn.lifespan.on",
            "--hidden-import", "fastapi",
            "--collect-all", "pyvips",
            "--hidden-import", "pyvips",
            "cli/main.py"
          )
          & pyinstaller @baseArgs @dllArgs

      - name: Build GUI executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        # Same --add-binary strategy as the CLI build above.
        run: |
          LIBVIPS=$(ldconfig -p | grep 'libvips\.so\.' | awk '{print $NF}' | head -1)
          echo "Bundling libvips: $LIBVIPS"
          pyinstaller \
            --onefile \
            --strip \
            --noconsole \
            --name ${{ matrix.gui_build_name }} \
            --add-data "profiles:profiles" \
            --add-data "cli/instructions_template.txt:cli" \
            --add-binary "$LIBVIPS:." \
            --collect-all customtkinter \
            --collect-all PIL \
            --collect-all numpy \
            --collect-all pyvips \
            --hidden-import tkinter \
            --hidden-import _tkinter \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --hidden-import tkinter.colorchooser \
            --hidden-import PIL._tkinter_finder \
            --hidden-import PIL.ImageTk \
            --hidden-import PIL.ImageFilter \
            --hidden-import pyvips \
            --hidden-import core.pipeline \
            --hidden-import core.models \
            --hidden-import core.registry \
            --hidden-import engine.compositor \
            --hidden-import engine.perspective \
            --hidden-import engine.blending \
            --hidden-import engine.spine_builder \
            gui/app.py

      - name: Build GUI executable (Windows)
        if: matrix.os == 'windows-latest'
        # --onedir avoids the per-launch extraction to %TEMP% that causes
        # 10-20 s startup delays on Windows (Defender scans extracted files).
        # The folder is zipped in the next step for single-archive distribution.
        # All vips DLLs are placed at the bundle root via --add-binary so that
        # cffi.dlopen('libvips-42.dll') and transitive DLL loads (libglib etc.)
        # succeed from the Windows DLL search path (exe directory).
        shell: pwsh
        run: |
          $dllArgs = @(Get-ChildItem -Path $env:VIPS_BIN -Filter "*.dll" |
              ForEach-Object { "--add-binary"; "$($_.FullName);." })
          Write-Host "Adding $($dllArgs.Count / 2) vips DLL(s) at bundle root via --add-binary"
          $baseArgs = @(
            "--onedir",
            "--noconsole",
            "--icon", "assets/box3d.ico",
            "--name", "${{ matrix.gui_build_name }}",
            "--add-data", "profiles;profiles",
            "--add-data", "cli/instructions_template.txt;cli",
            "--collect-all", "customtkinter",
            "--collect-all", "PIL",
            "--collect-all", "numpy",
            "--collect-all", "pyvips",
            "--hidden-import", "tkinter",
            "--hidden-import", "_tkinter",
            "--hidden-import", "tkinter.filedialog",
            "--hidden-import", "tkinter.messagebox",
            "--hidden-import", "tkinter.colorchooser",
            "--hidden-import", "PIL._tkinter_finder",
            "--hidden-import", "PIL.ImageTk",
            "--hidden-import", "PIL.ImageFilter",
            "--hidden-import", "pyvips",
            "--hidden-import", "core.pipeline",
            "--hidden-import", "core.models",
            "--hidden-import", "core.registry",
            "--hidden-import", "engine.compositor",
            "--hidden-import", "engine.perspective",
            "--hidden-import", "engine.blending",
            "--hidden-import", "engine.spine_builder",
            "gui/app.py"
          )
          & pyinstaller @baseArgs @dllArgs

      - name: Zip Windows GUI folder
        if: matrix.os == 'windows-latest'
        # Zip the entire onedir output so the release has a single download.
        # Extracts to box3d-gui-windows-x64\ — run the .exe inside that folder.
        run: |
          Compress-Archive `
            -Path dist\${{ matrix.gui_build_name }} `
            -DestinationPath dist\${{ matrix.gui_build_name }}.zip

      - name: Upload CLI asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}

      - name: Upload GUI asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.gui_artifact_path }}
