name: Release

# Trigger when a version tag is pushed (e.g. v2.0.0, v2.1.0-rc1).
on:
  push:
    tags:
      - "v*"

# Default to read-only; the release job explicitly elevates to contents:write.
permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Gate: run the full test suite before building any artifacts.
  # A release with failing tests is never uploaded.
  # ------------------------------------------------------------------
  test:
    name: Test gate (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package with dev + web dependencies
        run: python -m pip install -e ".[dev,web]"

      - name: Run test suite
        run: pytest tests/test_v2.py tests/test_web.py -v --tb=short

  # ------------------------------------------------------------------
  # Build: compile standalone executables and publish the GitHub Release.
  # Runs only after the test gate passes.
  #
  # pyvips loads libvips at runtime via cffi.dlopen() — a dynamic load
  # that PyInstaller cannot trace statically.  hooks/hook-pyvips.py
  # handles this: it runs during the PyInstaller build, finds the native
  # library on the build machine (where libvips is in PATH/ldconfig),
  # and places it at the bundle root so cffi.dlopen() and the OS dynamic
  # linker can find it at runtime.  No file-copying steps are needed.
  # ------------------------------------------------------------------
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test

    # This job writes to GitHub Releases.
    permissions:
      contents: write

    strategy:
      # Upload every platform even if one build fails, so the Release
      # page is as complete as possible for partial failures.
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            # PyInstaller appends .exe automatically on Windows.
            build_name: box3d-windows-x64
            artifact_path: dist/box3d-windows-x64.exe
            gui_build_name: box3d-gui-windows-x64
            # GUI uses --onedir; the folder is zipped for distribution.
            gui_artifact_path: dist/box3d-gui-windows-x64.zip
          - os: ubuntu-latest
            build_name: box3d-linux-x64
            artifact_path: dist/box3d-linux-x64
            gui_build_name: box3d-gui-linux-x64
            gui_artifact_path: dist/box3d-gui-linux-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install libvips native library (Linux)
        # libvips must be present on the build machine so that:
        #   (a) pyvips can import successfully during the build, and
        #   (b) hook-pyvips.py can resolve libvips.so.42 via ldconfig.
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips libvips-dev

      - name: Install libvips native library (Windows)
        # libvips must be present on the build machine so that:
        #   (a) pyvips can import successfully during the build, and
        #   (b) hook-pyvips.py can load libvips-42.dll via ctypes and
        #       resolve its full path via GetModuleFileNameW.
        # Adding the bin/ directory to PATH is sufficient for both.
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "8.15.5"
          $archive = "vips-dev-w64-web-${version}.zip"
          $url = "https://github.com/libvips/build-win64-mxe/releases/download/v${version}/${archive}"
          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing
          Expand-Archive -Path $archive -DestinationPath C:\vips
          $libvipsDll = Get-ChildItem -Path C:\vips -Recurse -Filter "libvips-42.dll" |
                          Select-Object -First 1
          if (-not $libvipsDll) { Write-Error "libvips-42.dll not found after extraction"; exit 1 }
          $binPath = $libvipsDll.Directory.FullName
          Write-Host "libvips bin dir: $binPath"
          echo $binPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install runtime dependencies, web + gui extras, and PyInstaller
        # pyvips (Python CFFI bindings) is installed here; the native libvips
        # library was installed in the platform-specific step above.
        run: python -m pip install pyinstaller ".[web,gui,quality]"

      - name: Verify pyvips loads on build machine
        # Confirms libvips is in PATH/ldconfig before PyInstaller runs.
        # If this fails the hook cannot collect the native library.
        run: python -c "import pyvips; print('pyvips', pyvips.__version__, '— libvips OK')"

      - name: Build standalone executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        # Resolve libvips.so.42 path via ldconfig before calling PyInstaller.
        # --add-binary places the .so at the ROOT of sys._MEIPASS, where the
        # PyInstaller bootloader sets LD_LIBRARY_PATH so cffi.dlopen() finds it.
        # This is explicit and does not rely on --collect-all's binary placement.
        run: |
          LIBVIPS=$(ldconfig -p | grep 'libvips\.so\.' | awk '{print $NF}' | head -1)
          echo "Bundling libvips: $LIBVIPS"
          pyinstaller \
            --onefile \
            --strip \
            --name ${{ matrix.build_name }} \
            --add-data "profiles:profiles" \
            --add-data "cli/instructions_template.txt:cli" \
            --add-data "web/ui:web/ui" \
            --add-data "tools:tools" \
            --additional-hooks-dir hooks \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import fastapi \
            --hidden-import pyvips \
            cli/main.py

      - name: Build standalone executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller `
            --onefile `
            --name ${{ matrix.build_name }} `
            --add-data "profiles;profiles" `
            --add-data "cli/instructions_template.txt;cli" `
            --add-data "web/ui;web/ui" `
            --add-data "tools;tools" `
            --additional-hooks-dir hooks `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import fastapi `
            --hidden-import pyvips `
            cli/main.py

      - name: Build GUI executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        # Same --add-binary strategy as the CLI build above.
        run: |
          LIBVIPS=$(ldconfig -p | grep 'libvips\.so\.' | awk '{print $NF}' | head -1)
          echo "Bundling libvips: $LIBVIPS"
          pyinstaller \
            --onefile \
            --strip \
            --noconsole \
            --name ${{ matrix.gui_build_name }} \
            --add-data "profiles:profiles" \
            --add-data "cli/instructions_template.txt:cli" \
            --additional-hooks-dir hooks \
            --collect-all customtkinter \
            --collect-all PIL \
            --collect-all numpy \
            --collect-all pyvips \
            --hidden-import tkinter \
            --hidden-import _tkinter \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --hidden-import tkinter.colorchooser \
            --hidden-import PIL._tkinter_finder \
            --hidden-import PIL.ImageTk \
            --hidden-import PIL.ImageFilter \
            --hidden-import pyvips \
            --hidden-import core.pipeline \
            --hidden-import core.models \
            --hidden-import core.registry \
            --hidden-import engine.compositor \
            --hidden-import engine.perspective \
            --hidden-import engine.blending \
            --hidden-import engine.spine_builder \
            gui/app.py

      - name: Build GUI executable (Windows)
        if: matrix.os == 'windows-latest'
        # --onedir avoids the per-launch extraction to %TEMP% that causes
        # 10-20 s startup delays on Windows (Defender scans extracted files).
        # The folder is zipped in the next step for single-archive distribution.
        # libvips-42.dll is in PATH (added by the Install libvips step) so
        # PyInstaller's DLL tracer picks it up and copies it into the bundle.
        run: |
          pyinstaller `
            --onedir `
            --noconsole `
            --icon assets/box3d.ico `
            --name ${{ matrix.gui_build_name }} `
            --add-data "profiles;profiles" `
            --add-data "cli/instructions_template.txt;cli" `
            --additional-hooks-dir hooks `
            --collect-all customtkinter `
            --collect-all PIL `
            --collect-all numpy `
            --collect-all pyvips `
            --hidden-import tkinter `
            --hidden-import _tkinter `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            --hidden-import tkinter.colorchooser `
            --hidden-import PIL._tkinter_finder `
            --hidden-import PIL.ImageTk `
            --hidden-import PIL.ImageFilter `
            --hidden-import pyvips `
            --hidden-import core.pipeline `
            --hidden-import core.models `
            --hidden-import core.registry `
            --hidden-import engine.compositor `
            --hidden-import engine.perspective `
            --hidden-import engine.blending `
            --hidden-import engine.spine_builder `
            gui/app.py

      - name: Zip Windows GUI folder
        if: matrix.os == 'windows-latest'
        # Zip the entire onedir output so the release has a single download.
        # Extracts to box3d-gui-windows-x64\ — run the .exe inside that folder.
        run: |
          Compress-Archive `
            -Path dist\${{ matrix.gui_build_name }} `
            -DestinationPath dist\${{ matrix.gui_build_name }}.zip

      - name: Upload CLI asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}

      - name: Upload GUI asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.gui_artifact_path }}
