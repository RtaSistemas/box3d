<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMAS — Dashboard de Timesheet</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: 0.02em; }
    header span.badge {
      background: #3b82f6;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    main {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
    }
    .card h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* Upload */
    .upload-zone {
      border: 2px dashed #475569;
      border-radius: 0.5rem;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
    .upload-zone input[type="file"] { display: none; }
    .upload-zone p { color: #64748b; font-size: 0.875rem; margin-top: 0.4rem; }
    .upload-zone .icon { font-size: 2rem; }

    /* Filter grid */
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      align-items: end;
    }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.75rem; color: #94a3b8; font-weight: 500; }

    select, button {
      height: 2.4rem;
      border-radius: 0.4rem;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.875rem;
      padding: 0 0.75rem;
      cursor: pointer;
    }
    select { width: 100%; }
    button {
      background: #3b82f6;
      border-color: #3b82f6;
      font-weight: 600;
      padding: 0 1.25rem;
      white-space: nowrap;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #2563eb; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      border-color: #475569;
      color: #94a3b8;
    }
    button.secondary:hover:not(:disabled) { border-color: #94a3b8; color: #e2e8f0; background: transparent; }

    /* Active filters pills */
    #activePills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(59,130,246,0.15);
      border: 1px solid #3b82f6;
      color: #93c5fd;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
    }
    .pill button {
      all: unset;
      cursor: pointer;
      color: #93c5fd;
      font-size: 0.85rem;
      line-height: 1;
    }
    .pill button:hover { color: #fff; }

    /* Notification */
    #notification {
      padding: 0.75rem 1rem;
      border-radius: 0.4rem;
      font-size: 0.875rem;
      display: none;
    }
    #notification.success { background: rgba(34,197,94,0.15); border: 1px solid #16a34a; color: #4ade80; }
    #notification.error   { background: rgba(239,68,68,0.15);  border: 1px solid #dc2626; color: #f87171; }
    #notification.info    { background: rgba(59,130,246,0.15); border: 1px solid #2563eb; color: #93c5fd; }

    /* Stats row */
    #statsRow {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      display: none;
    }
    .stat-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 1rem;
      text-align: center;
    }
    .stat-card .val { font-size: 1.6rem; font-weight: 700; }
    .stat-card .lbl { font-size: 0.7rem; color: #64748b; text-transform: uppercase; margin-top: 0.2rem; }
    .stat-card.blue .val  { color: #3b82f6; }
    .stat-card.amber .val { color: #f59e0b; }
    .stat-card.violet .val{ color: #8b5cf6; }
    .stat-card.green .val { color: #22c55e; }

    /* Chart */
    #chart { width: 100%; height: 520px; }
  </style>
</head>
<body>

<header>
  <h1>PMAS</h1>
  <span class="badge">Timesheet</span>
</header>

<main>

  <!-- Upload -->
  <div class="card">
    <h2>Importar Timesheet</h2>
    <label class="upload-zone" id="uploadZone">
      <input type="file" id="csvInput" accept=".csv,.xlsx,.xls" />
      <div class="icon">📂</div>
      <strong>Clique para selecionar CSV ou XLSX</strong>
      <p>ou arraste e solte aqui</p>
    </label>
    <div id="notification" style="margin-top:0.75rem;"></div>
  </div>

  <!-- Filters -->
  <div class="card">
    <h2>Filtros</h2>
    <div class="filter-grid">
      <div class="field">
        <label for="cycleSelect">Ciclo *</label>
        <select id="cycleSelect">
          <option value="">— Selecione um ciclo —</option>
        </select>
      </div>
      <div class="field">
        <label for="pepSelect">PEP (Código)</label>
        <select id="pepSelect">
          <option value="">— Todos os PEPs —</option>
        </select>
      </div>
      <div class="field">
        <label for="pepDescSelect">PEP (Descrição)</label>
        <select id="pepDescSelect">
          <option value="">— Todas as descrições —</option>
        </select>
      </div>
      <div class="field">
        <label for="collaboratorSelect">Colaborador</label>
        <select id="collaboratorSelect">
          <option value="">— Todos —</option>
        </select>
      </div>
      <div class="field" style="flex-direction:row; gap:0.5rem; align-items:flex-end;">
        <button id="loadBtn" disabled>Carregar</button>
        <button id="clearBtn" class="secondary">Limpar</button>
      </div>
    </div>
    <div id="activePills" style="margin-top:0.75rem;"></div>
  </div>

  <!-- Stats -->
  <div id="statsRow">
    <div class="stat-card blue">
      <div class="val" id="statNormal">—</div>
      <div class="lbl">Horas Normais</div>
    </div>
    <div class="stat-card amber">
      <div class="val" id="statExtra">—</div>
      <div class="lbl">Horas Extras</div>
    </div>
    <div class="stat-card violet">
      <div class="val" id="statStandby">—</div>
      <div class="lbl">Sobreaviso</div>
    </div>
    <div class="stat-card green">
      <div class="val" id="statTotal">—</div>
      <div class="lbl">Total</div>
    </div>
    <div class="stat-card" style="border-color:#334155;">
      <div class="val" id="statCollabs" style="color:#e2e8f0;">—</div>
      <div class="lbl">Colaboradores</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="card">
    <h2 id="chartTitle">Distribuição de Horas por Colaborador</h2>
    <div id="chart"></div>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
